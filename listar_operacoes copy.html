<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listar Operações</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    .container { max-width: 1200px; margin-top: 2rem; }
    .spinner-border-sm { width: 1rem; height: 1rem; }
    table th, table td { vertical-align: middle; font-size: 0.875rem; }
    .table td.parcela { text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="mb-4 text-center">Consulta de Operações</h2>

    <form id="formFiltro" class="row g-3 mb-4">
      <div class="col-md-3">
        <label class="form-label">Tipo</label>
        <select class="form-select" id="filtroTipo">
          <option value="">Todos</option>
          <option value="CRÉDITO">Crédito</option>
          <option value="DÉBITO">Débito</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Responsável</label>
        <select class="form-select" id="filtroResponsavel">
          <option value="">Todos</option>
          <option value="R">Rodrigo</option>
          <option value="C">Cris</option>
          <option value="A">Ambos</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Usuário</label>
        <select class="form-select" id="filtroUsuario"></select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Fatura (YYYY-MM)</label>
        <input class="form-control" id="filtroFatura" type="text" placeholder="2025-06">
      </div>
      <div class="col-md-3">
        <label class="form-label">Data Início</label>
        <input class="form-control" id="filtroDtIni" type="date">
      </div>
      <div class="col-md-3">
        <label class="form-label">Data Fim</label>
        <input class="form-control" id="filtroDtFim" type="date">
      </div>
      <div class="col-md-3 d-flex align-items-end">
        <button type="submit" class="btn btn-primary w-100">
          <span class="spinner-border spinner-border-sm d-none" id="spinner"></span>
          <span id="btnBuscarTexto">Buscar</span>
        </button>
      </div>
    </form>

    <div id="msgResultado"></div>

    <div class="table-responsive">
      <table class="table table-bordered table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Tipo</th>
            <th>Operadora</th>
            <th>Fatura</th>
            <th>Data</th>
            <th>Usuário</th>
            <th>Categoria</th>
            <th>Subcategoria</th>
            <th>Parcela</th>
            <th>Responsável</th>
            <th>Valor</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabelaResultados"></tbody>
      </table>
      <div class="d-flex justify-content-between align-items-center mt-3">
        <small id="paginacaoInfo" class="text-muted"></small>
        <div>
          <button class="btn btn-outline-secondary btn-sm me-2" onclick="paginaAnterior()">Anterior</button>
          <button class="btn btn-outline-secondary btn-sm" onclick="proximaPagina()">Próxima</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal de edição -->
  <div class="modal fade" id="modalEdicao" tabindex="-1" aria-labelledby="modalEdicaoLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalEdicaoLabel">Editar Operação</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="formEdicao">
            <div class="mb-3">
              <label for="editarNome" class="form-label">Nome da Operação</label>
              <input type="text" class="form-control" id="editarNome">
            </div>
            <div class="mb-3">
              <label for="editarValor" class="form-label">Valor</label>
              <input type="number" class="form-control" id="editarValor">
            </div>
            <button type="submit" class="btn btn-primary">Salvar alterações</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    function abrirModalEdicao(id) {
      const modal = new bootstrap.Modal(document.getElementById('modalEdicao'));
      // Aqui você poderia buscar os detalhes da operação por ID e preencher os campos
      document.getElementById('editarNome').value = '';
      document.getElementById('editarValor').value = '';
      modal.show();
    }

    /* scripts omitidos para brevidade */
    function renderizarTabela() {
      const tbody = document.getElementById('tabelaResultados');
      const inicio = (paginaAtual - 1) * porPagina;
      const fim = inicio + porPagina;
      const pagina = dadosOriginais.slice(inicio, fim);

      tbody.innerHTML = '';
      if (pagina.length === 0) {
        document.getElementById('msgResultado').innerHTML = '<div class="alert alert-warning">Nenhuma operação encontrada.</div>';
        document.getElementById('paginacaoInfo').textContent = '';
        return;
      }

      document.getElementById('msgResultado').innerHTML = '';
      pagina.forEach(op => {
        const dataFormatada = op.dt_operacao ? new Date(op.dt_operacao).toLocaleDateString('pt-BR') : '-';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${op.id_operacao}</td>
          <td>${op.tipo_operacao}</td>
          <td>${op.nm_operadora || '-'}</td>
          <td>${op.desc_fatura || '-'}</td>
          <td>${dataFormatada}</td>
          <td>${op.nm_usuario || '-'}</td>
          <td>${op.nm_categoria}</td>
          <td>${op.nm_sub_categoria}</td>
          <td class="parcela">${op.parcela_atual || '-'} / ${op.parcela_total || '-'}</td>
          <td>${op.tp_responsavel}</td>
          <td>R$ ${op.vl_operacao.toFixed(2)}</td>
          <td><button class="btn btn-sm btn-secondary" onclick="abrirModalEdicao(${op.id_operacao})">Editar</button></td>
        `;
        tbody.appendChild(tr);
      });

      const total = dadosOriginais.length;
      document.getElementById('paginacaoInfo').textContent = `Exibindo ${inicio + 1} a ${Math.min(fim, total)} de ${total} registros`;
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
