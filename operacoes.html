<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Operações</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    .form-section { max-width: 600px; margin: auto; padding-top: 2rem; }
    .spinner-border { width: 1.5rem; height: 1.5rem; }
    .d-none { display: none !important; }
  </style>
</head>
<body class="container">
  <div class="mt-3">
    <a href="index.html" class="btn btn-secondary">
      <i class="fas fa-arrow-left"></i> Voltar
    </a>
  </div>
  <h2 class="text-center mt-4">Cadastrar Operação</h2>
  <form id="formOperacao" class="form-section needs-validation" novalidate>
    <div class="mb-3">
      <label for="tipoOperacao" class="form-label">Tipo de Operação</label>
      <select id="tipoOperacao" class="form-select" required onchange="atualizarFormulario()">
        <option value="">Selecione</option>
        <option value="debito">Débito</option>
        <option value="credito">Crédito</option>
      </select>
      <div class="invalid-feedback">Escolha o tipo de operação.</div>
    </div>

    <div id="blocoCredito" class="d-none">
      <div class="mb-3">
        <label for="operadora" class="form-label">Operadora</label>
        <input type="text" class="form-control" id="operadora" value="C6" required>
      </div>
      <div class="mb-3">
        <label for="usuario" class="form-label">Usuário</label>
        <select id="usuario" class="form-select" required></select>
      </div>
    </div>

    <div id="blocoComum" class="d-none">
      <div class="mb-3">
        <label for="categoria" class="form-label">Categoria</label>
        <select id="categoria" class="form-select" required onchange="carregarSubcategorias()"></select>
      </div>
      <div class="mb-3">
        <label for="subcategoria" class="form-label">Subcategoria</label>
        <select id="subcategoria" class="form-select" required></select>
      </div>
      <div class="mb-3">
        <label for="valor" class="form-label">Valor da Operação</label>
        <input type="number" step="0.01" class="form-control" id="valor" required>
      </div>
      <div class="mb-3">
        <label for="parcelas" class="form-label">Número de Parcelas</label>
        <select id="parcelas" class="form-select" required></select>
      </div>
      <div class="mb-3">
        <label for="data" class="form-label">Data da Operação</label>
        <input type="date" class="form-control" id="data" required>
      </div>
      <div class="mb-3">
        <label for="responsavel" class="form-label">Responsável</label>
        <select id="responsavel" class="form-select" required>
          <option value="">Selecione</option>
          <option value="R">Rodrigo</option>
          <option value="C">Cris</option>
          <option value="A">Ambos</option>
        </select>
      </div>
    </div>

    <button class="btn btn-primary w-100 mt-3" type="submit">
      <span id="spinnerSalvar" class="spinner-border spinner-border-sm d-none"></span>
      <span id="btnTextSalvar">Salvar Operação</span>
    </button>
    <div id="msgOperacao" class="mt-3"></div>
  </form>

  <script>
    const apiBase = '/.netlify/functions/api-proxy';
    let categorias = [];

    document.getElementById('formOperacao').addEventListener('submit', function (e) {
      e.preventDefault();
      this.classList.add('was-validated');
      if (!this.checkValidity()) return;
      enviarOperacao();
    });

    function atualizarFormulario() {
      const tipo = document.getElementById('tipoOperacao').value;
      document.getElementById('blocoComum').classList.toggle('d-none', !tipo);
      document.getElementById('blocoCredito').classList.toggle('d-none', tipo !== 'credito');
    }

    function carregarCategorias() {
      fetch(apiBase, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ p_nome: '', p_sub: '', endpoint: 'pkg_categorias/LISTAR_CATEGORIAS_P' })
      })
      .then(res => res.json())
      .then(data => {
        categorias = data.p_cursor;
        const catSelect = document.getElementById('categoria');
        const unicas = [...new Set(categorias.map(c => c.nm_categoria))];
        catSelect.innerHTML = unicas.map(c => `<option value="${c}">${c}</option>`).join('');
        carregarSubcategorias();
      });
    }

    function carregarSubcategorias() {
      const cat = document.getElementById('categoria').value;
      const subSelect = document.getElementById('subcategoria');
      const subs = categorias.filter(c => c.nm_categoria === cat).map(c => c.nm_sub_categoria);
      subSelect.innerHTML = subs.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    function carregarUsuarios() {
      fetch(apiBase, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ endpoint: 'pkg_usuarios/LISTAR_USUARIOS_P' }) })
        .then(res => res.json())
        .then(data => {
          const select = document.getElementById('usuario');
          select.innerHTML = data.p_cursor.map(u => `<option value="${u.nm_usuario}">${u.nm_usuario}</option>`).join('');
          // Restore previously selected user (if any)
          const savedUser = sessionStorage.getItem('lastUsuario');
          if (savedUser) {
            const exists = Array.from(select.options).some(o => o.value === savedUser);
            if (!exists) {
              // if the saved user is not present in the list anymore, add it so value can be restored
              select.insertAdjacentHTML('afterbegin', `<option value="${savedUser}">${savedUser}</option>`);
            }
            select.value = savedUser;
          }
        });
    }

    function preencherParcelas() {
      const select = document.getElementById('parcelas');
      select.innerHTML = '';
      for (let i = 1; i <= 24; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = i;
        select.appendChild(opt);
      }
    }

    // Persist selected fields across page reloads
    function savePreferences() {
      try {
        const tipo = document.getElementById('tipoOperacao').value || '';
        const operadora = document.getElementById('operadora') ? document.getElementById('operadora').value : '';
        const usuario = document.getElementById('usuario') ? document.getElementById('usuario').value : '';
        const dataOper = document.getElementById('data') ? document.getElementById('data').value : '';
        sessionStorage.setItem('lastTipoOperacao', tipo);
        sessionStorage.setItem('lastOperadora', operadora);
        sessionStorage.setItem('lastUsuario', usuario);
        sessionStorage.setItem('lastDataOperacao', dataOper);
      } catch (e) {
        console.warn('Could not save preferences', e);
      }
    }

    function restorePreferences() {
      try {
        const tipo = sessionStorage.getItem('lastTipoOperacao');
        const operadora = sessionStorage.getItem('lastOperadora');
        // Try to restore saved values immediately (usuario is restored here too if options exist)
        if (tipo) {
          document.getElementById('tipoOperacao').value = tipo;
          atualizarFormulario();
        }

        if (operadora && document.getElementById('operadora')) {
          document.getElementById('operadora').value = operadora;
        }

        // restore data field
        const dataOper = sessionStorage.getItem('lastDataOperacao');
        if (dataOper && document.getElementById('data')) {
          document.getElementById('data').value = dataOper;
        }

        // restore usuario if possible (select may already be populated on the page)
        const savedUser = sessionStorage.getItem('lastUsuario');
        if (savedUser && document.getElementById('usuario')) {
          const select = document.getElementById('usuario');
          const exists = Array.from(select.options).some(o => o.value === savedUser);
          if (!exists) {
            select.insertAdjacentHTML('afterbegin', `<option value="${savedUser}">${savedUser}</option>`);
          }
          select.value = savedUser;
        }
      } catch (e) {
        console.warn('Could not restore preferences', e);
      }
    }

    function formatarData(inputDate) {
      const [yyyy, mm, dd] = inputDate.split('-');
      return `${dd}/${mm}/${yyyy}`; // Ex: 24/05/2025
    }

    function enviarOperacao() {
      const tipo = document.getElementById('tipoOperacao').value;
      const bodyBase = {
        p_nm_cat: document.getElementById('categoria').value,
        p_nm_sub: document.getElementById('subcategoria').value,
        p_vl_ope: parseFloat(document.getElementById('valor').value),
        p_tp_resp: document.getElementById('responsavel').value,
        p_dt_ope: formatarData(document.getElementById('data').value)
      };
      const rota = tipo === 'credito' ? 'pkg_operacoes/CRIAR_OPERACOES_CRE_P' : 'pkg_operacoes/CRIAR_OPERACOES_DEB_P';
      const bodyFinal = tipo === 'credito' ? {
        ...bodyBase,
        p_nm_ope: document.getElementById('operadora').value,
        p_nm_usu: document.getElementById('usuario').value,
        p_par_tot: parseInt(document.getElementById('parcelas').value)
      } : bodyBase;

      document.getElementById('spinnerSalvar').classList.remove('d-none');
      document.getElementById('btnTextSalvar').classList.add('d-none');

      fetch(apiBase, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...bodyFinal, endpoint: rota })
      })
        .then(res => res.json())
        .then(data => {
          console.log('Resposta da API:', data);
          const status = data.P_STATUS || data.p_status;
          const message = data.P_MESSAGE || data.p_message;
          const tipo = status === 'SUCESSO' ? 'success' : 'danger';
          document.getElementById('msgOperacao').innerHTML = `<div class="alert alert-${tipo}">[${status}] ${message}</div>`;
            if (status === 'SUCESSO') {
              // save current selections so they persist for this session
              savePreferences();
              // reset form then immediately restore the saved values so fields keep last-used values
              document.getElementById('formOperacao').reset();
              restorePreferences();
              carregarSubcategorias();
            }
        })
        .finally(() => {
          document.getElementById('spinnerSalvar').classList.add('d-none');
          document.getElementById('btnTextSalvar').classList.remove('d-none');
        });
    }

    window.onload = () => {
      restorePreferences();
      carregarCategorias();
      carregarUsuarios();
      preencherParcelas();
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
